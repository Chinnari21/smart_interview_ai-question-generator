<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interview Setup | Smart Interview AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: 
        linear-gradient(rgba(10,20,30,0.85), rgba(10,20,30,0.85)),
        url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80")
        no-repeat center/cover;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 95%;
      max-width: 900px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,229,255,0.25);
      animation: fadeIn 0.8s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { text-align: center; color: #00e5ff; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #ccc; margin-bottom: 18px; font-size: 14px; }

    .section { margin-bottom: 22px; }
    .section h2 { color: #7fe7ff; margin-bottom: 10px; font-size: 18px; }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .option-card {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.25s;
      border: 2px solid transparent;
    }

    .option-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 0 14px rgba(0,229,255,0.4); }
    .option-card.selected { border: 2px solid #00e5ff; background: rgba(0,229,255,0.18); box-shadow: 0 0 18px rgba(0,229,255,0.6); }

    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .skill-chip { background: rgba(0,229,255,0.18); border: 1px solid #00e5ff; border-radius: 20px; padding: 6px 12px; font-size: 12px; }

    .actions { text-align: center; margin-top: 25px; }

    button {
      background: linear-gradient(135deg, #00e5ff, #00bcd4);
      border: none;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      box-shadow: 0 0 22px rgba(0,229,255,0.6);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Setup Your Interview</h1>
    <div class="subtitle">Review skills, choose level, mode & timer options</div>

    <!-- Selected Skills -->
    <div class="section">
      <h2>✅ Selected Skills</h2>
      <div class="skills-wrap" id="skillsWrap"></div>
    </div>

    <!-- Level -->
    <div class="section">
      <h2>🎯 Select Interview Level</h2>
      <div class="options" id="levelOptions">
        <div class="option-card" data-value="beginner">🟢 Beginner</div>
        <div class="option-card" data-value="intermediate">🟡 Intermediate</div>
        <div class="option-card" data-value="advanced">🔴 Advanced</div>
      </div>
    </div>

    <!-- Mode -->
    <div class="section">
      <h2>🧠 Select Interview Mode</h2>
      <div class="options" id="modeOptions">
        <div class="option-card" data-value="chat">💬 Chat</div>
        <div class="option-card" data-value="voice">🔊 Voice</div>
        <div class="option-card" data-value="video">🎥 Video</div>
      </div>
    </div>

    <!-- Timer Options -->
    <div class="section">
      <h2>⏱️ Timer (Optional)</h2>
      <div class="options" id="timerOptions">
        <div class="option-card" data-value="on">Enable Timer</div>
        <div class="option-card selected" data-value="off">No Timer</div>
      </div>

      <div style="margin-top:12px;">
        <label style="color:#7fe7ff; font-size:14px;">Time per Question</label>
        <select id="timeSelect" style="width:100%; padding:10px; border-radius:8px; background:#111; color:#fff;">
          <option value="30">30 seconds</option>
          <option value="60" selected>60 seconds</option>
          <option value="90">90 seconds</option>
          <option value="120">120 seconds</option>
        </select>
      </div>
    </div>

    <form method="post" id="setupForm">
      {% csrf_token %}
      <input type="hidden" name="level" id="levelInput">
      <input type="hidden" name="mode" id="modeInput">
      <input type="hidden" name="skills" id="skillsInput">
      <input type="hidden" name="timer_enabled" id="timerInput" value="off">
      <input type="hidden" name="time_limit" id="timeLimitInput" value="60">

      <div class="actions">
        <button type="submit">Start Interview 🚀</button>
      </div>
    </form>
  </div>

  <script>
    // Read skills from URL
    const params = new URLSearchParams(window.location.search);
    const skills = (params.get("skills") || "").split(",").filter(Boolean);

    const skillsWrap = document.getElementById("skillsWrap");
    const skillsInput = document.getElementById("skillsInput");

    if (skills.length === 0) {
      skillsWrap.innerHTML = "<span style='color:#aaa'>No skills selected</span>";
    } else {
      skills.forEach(s => {
        const chip = document.createElement("span");
        chip.className = "skill-chip";
        chip.innerText = s;
        skillsWrap.appendChild(chip);
      });
      skillsInput.value = skills.join(",");
    }

    function setupSelection(containerId, inputId) {
      const container = document.getElementById(containerId);
      const input = document.getElementById(inputId);

      container.querySelectorAll('.option-card').forEach(card => {
        card.onclick = () => {
          container.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          input.value = card.dataset.value;
        };
      });
    }

    setupSelection("levelOptions", "levelInput");
    setupSelection("modeOptions", "modeInput");
    setupSelection("timerOptions", "timerInput");

    document.getElementById("timeSelect").onchange = (e) => {
      document.getElementById("timeLimitInput").value = e.target.value;
    };

    // 🚀 MAIN LOGIC: redirect based on selected mode
    document.getElementById("setupForm").onsubmit = (e) => {
      if (!levelInput.value || !modeInput.value) {
        e.preventDefault();
        alert("Please select both interview level and mode 😅");
        return;
      }

      const mode = modeInput.value;
      const level = levelInput.value;
      const skillsParam = skills.join(",");

      if (mode === "chat") {
        e.preventDefault(); // stop normal POST
       window.location.href = `/chat-interview/?skills=${encodeURIComponent(skillsParam)}&level=${encodeURIComponent(level)}`; 
      } 
      // else: let form submit normally for voice/video/text-voice
    };
  </script>

</body>
</html>
