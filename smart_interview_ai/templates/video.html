<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Interview | Smart Interview AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(10,20,30,0.85), rgba(10,20,30,0.85)),
        url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80")
        no-repeat center/cover;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 22px 25px 25px;
      box-shadow: 0 0 35px rgba(0,229,255,0.35);
      position: relative;
    }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .nav-btn { padding:8px 14px; border-radius:20px; font-weight:600; font-size:13px; text-decoration:none;
      background: linear-gradient(90deg, #00e5ff, #00ffc6); color:#003333; box-shadow:0 6px 16px rgba(0,229,255,0.5); }
    .nav-btn.secondary { background:transparent; color:#38bdf8; box-shadow: inset 0 0 0 1px rgba(56,189,248,0.6); }

    h1 { margin:6px 0 10px; background:linear-gradient(90deg,#00e5ff,#00ffc6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    .question-box { padding:14px 16px; border-radius:14px;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,77,255,0.15));
      border:1px solid rgba(255,255,255,0.15); margin-bottom:8px; font-size:15px; }

    .status { font-size:12px; margin-left:8px; }
    .status.done { color:#22c55e; }
    .status.pending { color:#facc15; }

    .tips { margin:10px 0; padding:10px 12px; border-radius:12px; background: rgba(255,255,255,0.06); font-size:12px; color:#cbd5e1; }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    video { width:100%; border-radius:16px; background:#000; box-shadow:0 0 20px rgba(0,229,255,0.4); }

    .controls { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:9px 16px; border-radius:22px; border:none; cursor:pointer; font-weight:600;
      background: linear-gradient(90deg, #00e5ff, #00ffc6); color:#003333; box-shadow:0 6px 16px rgba(0,229,255,0.5); }
    .btn.secondary { background:transparent; color:#38bdf8; box-shadow: inset 0 0 0 1px rgba(56,189,248,0.6); }

    .meter { margin-top:8px; font-size:12px; color:#9ad; }
    .bar { height:6px; background:#0b1220; border-radius:10px; overflow:hidden; margin-top:4px; }
    .fill { height:100%; background: linear-gradient(90deg,#00e5ff,#00ffc6); width:0%; }

    .footer-actions { margin-top:14px; display:flex; gap:10px; justify-content:flex-end; }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      color: #00ffc6;
      padding: 10px 16px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,229,255,0.6);
      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
      pointer-events: none;
      font-size: 13px;
    }
    .toast.show { opacity:1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <a href="javascript:history.back()" class="nav-btn secondary">← Previous</a>
    <a href="/dashboard/" class="nav-btn">🏠 Dashboard</a>
  </div>

  <h1>🎥 Video Interview</h1>

  <div class="question-box">
    <strong id="questionText">Loading question...</strong>
    <span id="status" class="status pending">⏺️ Not Recorded</span>
  </div>

  <div class="tips">
    💡 Tips: Maintain eye contact • Structure answers (STAR) • Speak clearly • Avoid long pauses
  </div>

  <div class="controls" style="margin-bottom:10px;">
    <button class="btn secondary" onclick="nextQuestion()">Next Question</button>
    <button class="btn secondary" onclick="toggleFullscreen()">Fullscreen Camera</button>
  </div>

  <div class="grid">
    <div>
      <h3>Live Camera</h3>
      <video id="preview" autoplay muted></video>
      <div class="controls">
        <button class="btn" onclick="startCamera()">Start Camera</button>
        <button class="btn secondary" onclick="stopCamera()">Stop Camera</button>
        <button class="btn" onclick="startRecording()">Start Recording</button>
        <button class="btn secondary" onclick="stopRecording()">Stop Recording</button>
        <button class="btn secondary" onclick="retake()">Retake</button>
      </div>
    </div>

    <div>
      <h3>Your Recording</h3>
      <video id="playback" controls></video>
      <div class="meter">
        🤖 Confidence (AI – Demo)
        <div class="bar"><div id="confFill" class="fill"></div></div>
      </div>
    </div>
  </div>

  <div class="footer-actions">
    <a href="/my-recordings/" class="btn">▶️ My Recordings</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let stream, mediaRecorder, recordedChunks=[];
  let prevQuestion = "";

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2000);
  }

  async function fetchNextQuestion() {
    const formData = new FormData();
    formData.append("prev_question", prevQuestion);

    const res = await fetch("/api/video-next-question/", {
      method: "POST",
      headers: { "X-CSRFToken": getCookie("csrftoken") },
      body: formData
    });

    const data = await res.json();
    if (data.question) {
      prevQuestion = data.question;
      document.getElementById("questionText").textContent = data.question;
      document.getElementById("status").textContent = "⏺️ Not Recorded";
      document.getElementById("status").className = "status pending";
    }
  }

  async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    preview.srcObject = stream;
  }

  function stopCamera(){
    stream && stream.getTracks().forEach(t=>t.stop());
    preview.srcObject=null;
  }

  function startRecording() {
    if (!stream) { alert("Start camera first"); return; }
    recordedChunks=[];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>recordedChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks,{type:'video/webm'});
      playback.src = URL.createObjectURL(blob);

      document.getElementById("status").textContent="✅ Recorded";
      document.getElementById("status").className="status done";
      document.getElementById("confFill").style.width = (60+Math.random()*35) + "%";

      showToast("Recording finished, uploading...");

      const fd = new FormData();
      fd.append("video", blob, "recording.webm");

      try {
        const res = await fetch("/upload-recording/", { method:"POST", body: fd });
        const data = await res.json();
        if (data.ok) showToast("Saved to My Recordings");
        else alert("Upload failed");
      } catch (e) {
        alert("Upload error");
      }
    };
    mediaRecorder.start();
    showToast("Recording started");
  }

  function stopRecording(){ mediaRecorder && mediaRecorder.stop(); }
  function retake(){
    playback.src="";
    document.getElementById("status").textContent="⏺️ Not Recorded";
    document.getElementById("status").className="status pending";
  }
  function nextQuestion(){ fetchNextQuestion(); }
  function toggleFullscreen(){ preview.requestFullscreen && preview.requestFullscreen(); }

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  // Load first question on page load
  fetchNextQuestion();
</script>

</body>
</html>
