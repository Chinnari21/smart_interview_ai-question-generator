<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(rgba(5,10,20,0.6), rgba(5,10,20,0.7)),
      url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80")
      no-repeat center/cover;
      font-family:sans-serif;
      color:white;
    }

    .card {
      width:350px;
      padding:30px;
      border-radius:12px;
      background:rgba(10,15,25,0.8);
      text-align:center;
    }

    input,button {
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
    }

    button {
      background:#00e5ff;
      font-weight:bold;
    }

    .error {
      color:red;
      font-size:12px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Forgot Password</h2>

  <form method="POST">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Enter your email" required>
    <button>Next</button>
  </form>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
</div>

</body>
</html>
