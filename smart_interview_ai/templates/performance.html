<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Performance | Smart Interview AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f2027, #203a43, #000);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .card {
      width: 95%;
      max-width: 900px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 30px 26px 28px;
      box-shadow: 0 0 30px rgba(0,255,255,0.35);
    }

    h1 {
      text-align: center;
      color: #00f2ff;
      margin-bottom: 8px;
    }

    .overall {
      text-align: center;
      font-size: 46px;
      font-weight: bold;
      margin: 10px 0 24px;
      color: #00ffd5;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-box {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: inset 0 0 8px rgba(255,255,255,0.05);
    }

    .metric-title {
      font-size: 14px;
      margin-bottom: 8px;
      color: #9befff;
    }

    .bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffd5, #00bcd4);
      border-radius: 10px;
      transition: width 1s ease;
      box-shadow: 0 0 10px rgba(0,255,255,0.7);
    }

    .bar-value {
      text-align: right;
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.9;
    }

    .feedback {
      margin-top: 18px;
      background: rgba(0,0,0,0.4);
      border-radius: 14px;
      padding: 16px 18px;
    }

    .feedback h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #00f2ff;
      font-size: 18px;
    }

    .feedback ul {
      margin: 0;
      padding-left: 18px;
      font-size: 14px;
      line-height: 1.6;
      color: #d6faff;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      background: linear-gradient(135deg, #00f2ff, #00c6ff);
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      color: #000;
      box-shadow: 0 0 18px rgba(0,255,255,0.7);
      transition: 0.25s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 26px rgba(0,255,255,0.95);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>📊 Performance Overview</h1>

    <div class="overall" id="overallScore">--%</div>

    <div class="metrics">
      <div class="metric-box">
        <div class="metric-title">Confidence</div>
        <div class="bar"><div class="bar-fill" id="confidenceBar"></div></div>
        <div class="bar-value" id="confidenceVal">--%</div>
      </div>

      <div class="metric-box">
        <div class="metric-title">Clarity</div>
        <div class="bar"><div class="bar-fill" id="clarityBar"></div></div>
        <div class="bar-value" id="clarityVal">--%</div>
      </div>

      <div class="metric-box">
        <div class="metric-title">Communication</div>
        <div class="bar"><div class="bar-fill" id="communicationBar"></div></div>
        <div class="bar-value" id="communicationVal">--%</div>
      </div>
    </div>

    <div class="feedback">
      <h3>AI Feedback</h3>
      <ul id="feedbackList">
        <li>Loading feedback...</li>
      </ul>
    </div>

    <div class="actions">
      <a href="/dashboard/" class="btn">Back to Dashboard</a>
      <a href="/setup/" class="btn">Practice Again</a>
    </div>
  </div>

  <script>
    async function loadPerformance() {
      try {
        const res = await fetch("/api/performance/");
        const data = await res.json();

        document.getElementById("overallScore").innerText = data.overall + "%";

        setBar("confidenceBar", "confidenceVal", data.confidence);
        setBar("clarityBar", "clarityVal", data.clarity);
        setBar("communicationBar", "communicationVal", data.communication);

        const feedbackList = document.getElementById("feedbackList");
        feedbackList.innerHTML = "";
        data.feedback.forEach(item => {
          const li = document.createElement("li");
          li.innerText = item;
          feedbackList.appendChild(li);
        });

      } catch (e) {
        document.getElementById("feedbackList").innerHTML = "<li>Unable to load performance data.</li>";
      }
    }

    function setBar(barId, valId, value) {
      const bar = document.getElementById(barId);
      const val = document.getElementById(valId);
      bar.style.width = value + "%";
      val.innerText = value + "%";
    }

    loadPerformance();
  </script>

</body>
</html>
