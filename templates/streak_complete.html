<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streak Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.2);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #00ff9d;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #ddd;
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 15px;
      animation: bounce 1.5s infinite;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #0cf5a0;
      color: rgb(13, 13, 13);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2c3230;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="emoji">🔥🎉</div>
    <h1>Congratulations!</h1>
    <p>You have successfully completed your streak 🚀</p>

    <button onclick="window.location.href='/interview-summary/'">
      View Summary →
    </button>
  </div>

</body>
</html>
