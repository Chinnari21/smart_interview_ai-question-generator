<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coding Interview | Smart Interview AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(10,20,30,0.9), rgba(10,20,30,0.9)),
    url("https://images.unsplash.com/photo-1518770660439-4636190af475")
    no-repeat center/cover;
  font-family: 'Segoe UI';
  color: white;
}

/* LAYOUT */
.main-layout {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.left-panel {
  flex: 2;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 20px;
}

.right-panel {
  flex: 1;
  background: rgba(0,0,0,0.85);
  padding: 20px;
  border-radius: 20px;
  position: sticky;
  top: 20px;
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

/* HEADER */
h1 { text-align:center; color:#00eaff; }

.timer {
  text-align:right;
  color:#00ffcc;
}

/* QUESTION */
.question-box {
  background: rgba(0,255,255,0.1);
  padding:15px;
  border-radius:12px;
  margin:15px 0;
}

/* CODE */
textarea {
  width:100%;
  height:180px;
  background:#0d1117;
  color:#00ffcc;
  border:none;
  border-radius:12px;
  padding:12px;
  font-family: monospace;
  margin-top:10px;
}

/* BUTTONS */
.buttons {
  margin-top:10px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

.primary { background:#00eaff; color:#000; }
.secondary { background:#444; color:#fff; }

/* OUTPUT */
.console-box {
  background:#000;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-family:monospace;
}

.output { color:#00ff00; }
.error { color:#ff4d4d; }

/* TEST */
#testResultBox {
  margin-top:10px;
  color:#00ffcc;
  white-space:pre-line;
}

/* AI HEADER 🔥 */
.ai-header {
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  font-weight:bold;
  color:#00eaff;
}

.ai-header img {
  width:35px;
}

/* SOLUTION */
.solution {
  background:#000;
  padding:12px;
  border-radius:12px;
  color:#00ffcc;
  white-space:pre-wrap;
  margin-top:10px;
  box-shadow: 0 0 10px rgba(0,255,255,0.4);
}

/* COPY BUTTON */
.copy-btn {
  margin-top:10px;
  padding:6px 12px;
  border-radius:10px;
  background:#00eaff;
  color:#000;
  cursor:pointer;
  border:none;
}

/* NAV */
.nav-btn {
  display:inline-block;
  margin-bottom:10px;
  padding:8px 14px;
  border-radius:20px;
  background:#00eaff;
  color:#000;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="main-layout">

<!-- LEFT -->
<div class="left-panel">

<a href="/dashboard/" class="nav-btn">🏠 Dashboard</a>

<h1>💻 Coding Interview</h1>

<div class="timer">
⏱ Time Left: <span id="timerText">60</span>s
</div>

<div class="question-box" id="questionText">Loading...</div>

<textarea id="codeBox" placeholder="Write your code here..."></textarea>

<textarea id="inputBox" placeholder="Enter input..."></textarea>

<div class="buttons">
<button class="primary" onclick="runCode()">▶ Run</button>
<button class="primary" onclick="submitCode()">Submit</button>
<button class="secondary" onclick="nextQuestion()">Next</button>
</div>

<div id="outputBox" class="console-box output"></div>
<div id="errorBox" class="console-box error"></div>

<h3>🧪 Test Results</h3>
<div id="testResultBox"></div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="ai-header">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
<span>AI Solution</span>
</div>

<div id="solutionBox" class="solution"></div>

<button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>

<p style="font-size:12px; color:#aaa;">Generated by AI 🤖</p>

</div>

</div>

<script>

let currentQuestion = "";
let timerInterval;
let timeLimit = 60;

// CSRF
function getCookie(name){
  let v=null;
  document.cookie.split(";").forEach(c=>{
    c=c.trim();
    if(c.startsWith(name+"=")){
      v=decodeURIComponent(c.substring(name.length+1));
    }
  });
  return v;
}

// TIMER
function startTimer(){
  clearInterval(timerInterval);
  let timeLeft = timeLimit;
  document.getElementById("timerText").innerText = timeLeft;

  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timerText").innerText = timeLeft;

    if(timeLeft <= 10){
      document.getElementById("timerText").style.color = "red";
    }

    if(timeLeft <= 0){
      clearInterval(timerInterval);
      alert("⏰ Time's up!");
      nextQuestion();
    }
  },1000);
}

// LOAD QUESTION
async function nextQuestion(){

  startTimer();

  const res = await fetch("/api/coding-question/");
  const data = await res.json();

  currentQuestion = data.question || "No question";
  document.getElementById("questionText").innerText = currentQuestion;

  document.getElementById("codeBox").value = "";
  document.getElementById("inputBox").value = "";
  document.getElementById("outputBox").innerText = "";
  document.getElementById("errorBox").innerText = "";
  document.getElementById("solutionBox").innerText = "";
  document.getElementById("testResultBox").innerText = "";
}

// RUN CODE
async function runCode(){

  let code = document.getElementById("codeBox").value;
  let input = document.getElementById("inputBox").value;

  const res = await fetch("/run-code/", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken": getCookie("csrftoken")
    },
    body: JSON.stringify({ code: code, input: input })
  });

  const data = await res.json();

  document.getElementById("outputBox").innerText = data.stdout || "";
  document.getElementById("errorBox").innerText = data.stderr || "";
}

// SUBMIT CODE
async function submitCode(){

  let code = document.getElementById("codeBox").value;

  const res = await fetch("/api/evaluate-code/", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken": getCookie("csrftoken")
    },
    body: JSON.stringify({
      question: currentQuestion,
      code: code
    })
  });

  const data = await res.json();

  document.getElementById("solutionBox").innerText = data.solution || "";
  document.getElementById("testResultBox").innerText = data.result || "";
}

// COPY CODE
function copyCode(){
  let code = document.getElementById("solutionBox").innerText;
  navigator.clipboard.writeText(code);
  alert("Copied!");
}

// AUTO LOAD
window.onload = nextQuestion;

</script>

</body>
</html>
